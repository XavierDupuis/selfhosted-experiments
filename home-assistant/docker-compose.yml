services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.3.1@sha256:0e091dfce3068339c3e1d14382e6c34141e05cd589a1972ebd4d9a8e6b5d8969
    container_name: home-assistant
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ${DIRECTORY:?Missing variable DIRECTORY}/home-assistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    ports:
      - ${HA_WEB_PORT:-8123}:8123
    labels:
      - traefik.enable=true
      - traefik.http.routers.home-assistant.tls.certresolver=myresolver
      - traefik.http.services.home-assistant.loadbalancer.server.port=8123
      - homepage.instance.internal.group=Utilities
      - homepage.instance.internal.name=Home Assistant
      - homepage.instance.internal.icon=home-assistant.png
      # - homepage.instance.public.href=https://homeassistant.${DOMAIN:?Missing variable DOMAIN}
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${HA_WEB_PORT:-8123}
      - homepage.instance.internal.description=Open source home automation that puts local control and privacy first.

  mqtt:
    image: eclipse-mosquitto:2.0.22@sha256:6852da90a65dfff7aa3a1c8b249e92bb83c17ea8bbcce56bedff8707332a1a29
    container_name: mqtt
    restart: unless-stopped
    volumes:
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/config:/mosquitto/config
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/data:/mosquitto/data
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/log:/mosquitto/log
    ports:
      - ${MQTT_PORT:-1883}:1883
    labels:
      - homepage.instance.internal.group=Utilities
      - homepage.instance.internal.name=MQTT
      - homepage.instance.internal.icon=mqtt.png
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${MQTT_PORT:-1883}
      - homepage.instance.internal.description=Open source message broker 

