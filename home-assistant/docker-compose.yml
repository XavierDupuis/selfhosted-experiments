services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.3.1@sha256:0e091dfce3068339c3e1d14382e6c34141e05cd589a1972ebd4d9a8e6b5d8969
    container_name: home-assistant
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ${DIRECTORY:?Missing variable DIRECTORY}/home-assistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    ports:
      - ${HA_WEB_PORT:-8123}:8123
    labels:
      - traefik.enable=true
      - traefik.http.routers.home-assistant.tls.certresolver=myresolver
      - traefik.http.services.home-assistant.loadbalancer.server.port=8123
      - homepage.group=Utilities
      - homepage.name=Home Assistant
      - homepage.icon=home-assistant.png
      # - homepage.instance.public.href=https://homeassistant.${DOMAIN:?Missing variable DOMAIN}
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${HA_WEB_PORT:-8123}
      - homepage.description=Open source home automation that puts local control and privacy first.

  mqtt:
    image: eclipse-mosquitto:2.0.22@sha256:6852da90a65dfff7aa3a1c8b249e92bb83c17ea8bbcce56bedff8707332a1a29
    container_name: mqtt
    restart: unless-stopped
    volumes:
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/config:/mosquitto/config
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/data:/mosquitto/data
      - ${DIRECTORY:?Missing variable DIRECTORY}/mqtt/log:/mosquitto/log
    ports:
      - ${MQTT_PORT:-1883}:1883
    labels:
      - homepage.group=Utilities
      - homepage.name=MQTT
      - homepage.icon=mqtt.png
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${MQTT_PORT:-1883}
      - homepage.description=Open source message broker 

  music-assistant:
    image: ghcr.io/music-assistant/server:2.7.11@sha256:ff2d625856864912e85ff611dae4c5df814abfb7ffc3bd6020e8426b7af81c1e
    container_name: music-assistant
    restart: unless-stopped
    # Network mode must be set to host for MA to work correctly
    # network_mode: host
    volumes:
      - ${DIRECTORY:?Missing variable DIRECTORY}/music-assistant/data:/data
    ports:
      - ${MA_WEB_PORT:-8095}:8095
    labels:
      - homepage.group=Utilities
      - homepage.name=Music Assistant
      - homepage.icon=music-assistant.png
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${MA_WEB_PORT:-8095}
      - homepage.description=Music library manager for your offline and online music sources
