services:
  kiwix-serve:
    image: ghcr.io/kiwix/kiwix-serve:3.8.2@sha256:acdab28186a66b51bfd4202210c6732931ea95cf41c711148a0c9770b9fcc9e1
    container_name: kiwix
    restart: unless-stopped
    ports:
      - ${WEB_PORT:-8080}:8080
    volumes:
      - ${LIBRARY_DIRECTORY:?Missing variable LIBRARY_DIRECTORY}/web-archives:/data
    command:
      - '*.zim'
    labels:
      - traefik.enable=true
      - traefik.http.routers.kiwix.tls.certresolver=myresolver
      - traefik.http.services.kiwix.loadbalancer.server.port=8080
      - homepage.instance.internal.group=Archiving
      - homepage.instance.internal.name=Kiwix
      - homepage.instance.internal.icon=kiwix.png
      # - homepage.instance.public.href=https://kiwix.${DOMAIN:?Missing variable DOMAIN}
      - homepage.instance.internal.href=${HOST_URL:-http://localhost}:${WEB_PORT:-8080}
      - homepage.instance.internal.description=An offline reader for Wikipedia (& many other websites)